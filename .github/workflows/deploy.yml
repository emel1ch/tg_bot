name: CI/CD Deploy

on:
  push:
    branches: [ "master" ]   # Запускается при каждом push в ветку master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}       # IP сервера (77.221.143.122)
          username: ${{ secrets.SERVER_USER }}   # Пользователь (root)
          key: ${{ secrets.SSH_PRIVATE_KEY }}    # Приватный SSH-ключ
          script: |
            cd /root/tg_bot                      # Путь к папке проекта на сервере
            git pull origin main
            docker-compose up -d --build
